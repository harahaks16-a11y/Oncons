<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Expert - OnCons</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/styles.css">
</head><body>

<div class="page expert-detail-page"><div id="detail">Loading...</div></div>

<script src="/assets/js/shared.js"></script>
<script>
const id=new URLSearchParams(location.search).get('id');
(async()=>{
  try{
    const e=await api('/experts/'+id);
    const reviews=await api('/experts/'+id+'/reviews').catch(()=>[]);
    detail.innerHTML=`
      <div class="expert-hero expert-profile-hero">
        ${e.profile_photo_url?`<img src="${e.profile_photo_url}" alt="${e.name}">`:'<div class="avatar-xl">'+e.name.slice(0,1)+'</div>'}
        <div><h1>${e.name}</h1><p>${e.category} - ${e.years_experience} years experience</p><div class="stars">${'★'.repeat(Math.round(e.rating||5))} <span>(${reviews.length} reviews)</span></div></div>
      </div>
      <div class="grid-2 detail-grid">
        <div class="card expert-about-card"><h2>About</h2><p>${e.bio||''}</p><div class="info-pair"><span>City</span><strong>${e.city||'Online'}</strong></div><div class="info-pair"><span>Languages</span><strong>${e.languages||'Not specified'}</strong></div>
          <div id="detailsBox" class="unlock-panel">
            <div><strong>Premium consultant details</strong><p>Unlock extended feedback, performance notes, and all visible reviews.</p></div>
            <button class="btn btn-primary" onclick="unlockDetails()">Pay INR ${e.details_price||25}</button>
          </div>
        </div>
        <form class="card form booking-card" onsubmit="book(event)"><p class="section-tag">Secure booking</p><h2>Book consultation</h2>
          <div class="grid-2"><label>Date<input required type="date" id="bookDate"></label><label>Time<input required type="time" id="bookTime"></label></div>
          <label>Consultation mode<select id="consultMode"><option value="video">Video call</option><option value="audio">Call</option><option value="chat">Chat</option></select></label>
          <p><strong>Fee:</strong> INR ${e.fee} / session</p><button id="bookBtn" class="btn btn-primary">Continue to payment</button><div id="bookingPay"></div></form>
      </div>
      <h2>Reviews</h2>
      <div id="reviewList">${reviews.slice(0,2).map(r=>`<div class="review-mini"><strong>${r.user_name||'User'}</strong><span>${r.rating} star</span><p>${r.comment}</p></div>`).join('')||'<p>No reviews yet.</p>'}</div>
      ${reviews.length>2?`<div class="empty-state" style="margin-top:12px">More reviews are locked. Pay INR ${e.details_price||25} to view all review details.</div>`:''}`;
    const starBox=detail.querySelector('.stars');
    if(starBox) starBox.innerHTML='&#9733;'.repeat(Math.round(e.rating||5))+' <span>('+reviews.length+' reviews)</span>';
  }catch(err){detail.innerHTML='<p class="alert alert-error">'+err.message+'</p>'}
})();
async function book(e){
  e.preventDefault();
  const box=document.getElementById('bookingPay');
  const btn=document.getElementById('bookBtn');
  if(!userGet()){location.href='/login.html';return}
  const rawDate=document.getElementById('bookDate').value;
  const rawTime=document.getElementById('bookTime').value;
  if(!rawDate || !rawTime){box.innerHTML='<div class="alert alert-error">Choose date and time first.</div>';return}
  const pickedDate=new Date(`${rawDate}T${rawTime}`);
  if(Number.isNaN(pickedDate.getTime())){box.innerHTML='<div class="alert alert-error">Choose a valid date and time.</div>';return}
  const scheduled_at=pickedDate.toISOString();
  const mode=document.getElementById('consultMode').value;
  btn.disabled=true;
  box.innerHTML='<div class="empty-state">Creating booking...</div>';
  try{
    const bk=await api('/bookings',{method:'POST',body:JSON.stringify({expert_id:Number(id),scheduled_at,mode})});
    box.innerHTML=`<div class="booking-pay-panel"><strong>Booking created.</strong><br>Pay INR ${bk.amount} to confirm it and add it to your dashboard.
      <div class="pay-method-grid">
        <button type="button" class="pay-method active" data-provider="upi" onclick="chooseProvider(this)">UPI / QR</button>
        <button type="button" class="pay-method" data-provider="debit_card" onclick="chooseProvider(this)">Debit card</button>
        <button type="button" class="pay-method" data-provider="credit_card" onclick="chooseProvider(this)">Credit card</button>
      </div>
      <div id="bookingMethodPreview" class="payment-method-preview">${paymentMethodPreview('upi')}</div>
      <button type="button" class="btn btn-primary" style="margin-top:12px" onclick="payBooking(${bk.id})">Pay and confirm booking</button></div>`;
  }
  catch(err){box.innerHTML='<div class="alert alert-error">'+err.message+'</div>'}
  finally{btn.disabled=false}
}
async function payBooking(bookingId){
  const box=document.getElementById('bookingPay');
  const provider=document.querySelector('.pay-method.active')?.dataset.provider||'upi';
  if((provider==='debit_card'||provider==='credit_card') && !validCardForm('bookingMethodPreview')) return;
  box.insertAdjacentHTML('beforeend','<div id="payStatus" class="empty-state" style="margin-top:10px">Preparing payment...</div>');
  const r=await api('/payments/checkout',{method:'POST',body:JSON.stringify({plan:'booking',booking_id:bookingId,provider})});
  if(r.checkout_url && !r.checkout_url.includes('stub.local')){location.href=r.checkout_url;return}
  box.innerHTML=`<div class="empty-state"><h3>Complete payment</h3><p>Amount: INR ${r.amount}</p>${provider==='upi'?paymentQrHtml(r):cardSummary(provider)}<div id="paymentWait"></div></div>`;
  waitForPayment(r.payment_id, document.getElementById('paymentWait'), ()=>location.href='/dashboard/bookings.html');
}
function chooseProvider(btn){
  document.querySelectorAll('.pay-method').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const preview=btn.closest('.booking-pay-panel,.details-pay-panel')?.querySelector('.payment-method-preview');
  if(preview) preview.innerHTML=paymentMethodPreview(btn.dataset.provider);
}
async function unlockDetails(){
  try{
    const existing=await api('/experts/'+id+'/paid-details');
    showDetails(existing);
  }catch(err){
    if(!userGet()){location.href='/login.html';return}
    detailsBox.className='empty-state';
    detailsBox.innerHTML=`<div class="details-pay-panel"><h3>Pay INR 25</h3>
      <div class="pay-method-grid">
        <button type="button" class="pay-method active" data-provider="upi" onclick="chooseProvider(this)">UPI / QR</button>
        <button type="button" class="pay-method" data-provider="debit_card" onclick="chooseProvider(this)">Debit card</button>
        <button type="button" class="pay-method" data-provider="credit_card" onclick="chooseProvider(this)">Credit card</button>
      </div>
      <div id="detailsMethodPreview" class="payment-method-preview">${paymentMethodPreview('upi')}</div>
      <button class="btn btn-primary" style="margin-top:12px" onclick="payDetails()">Pay and verify</button>
      <div id="detailsWait"></div></div>`;
  }
}
async function payDetails(){
  const provider=document.querySelector('.details-pay-panel .pay-method.active')?.dataset.provider||'upi';
  if((provider==='debit_card'||provider==='credit_card') && !validCardForm('detailsMethodPreview')) return;
  const r=await api('/payments/checkout',{method:'POST',body:JSON.stringify({plan:'details',purpose:'details',expert_id:Number(id),provider})});
  detailsWait.innerHTML=provider==='upi'?paymentQrHtml(r):cardSummary(provider);
  waitForPayment(r.payment_id, detailsWait, async()=>showDetails(await api('/experts/'+id+'/paid-details')));
}
function paymentMethodPreview(provider){
  if(provider==='upi') return '<div class="empty-state">Click pay to show the QR, then wait for automatic verification.</div>';
  return `<div class="card-form">
    <label>Card number<input class="card-number" inputmode="numeric" maxlength="19" placeholder="1234 5678 9012 3456"></label>
    <div class="grid-2"><label>Expiry<input class="card-expiry" placeholder="MM/YY" maxlength="5"></label><label>CVV<input class="card-cvv" inputmode="numeric" maxlength="4" placeholder="123"></label></div>
    <label>Name on card<input class="card-name" placeholder="Card holder name"></label>
  </div>`;
}
function validCardForm(containerId){
  const el=document.getElementById(containerId);
  const num=(el.querySelector('.card-number')?.value||'').replace(/\s/g,'');
  const exp=el.querySelector('.card-expiry')?.value||'';
  const cvv=el.querySelector('.card-cvv')?.value||'';
  const name=el.querySelector('.card-name')?.value||'';
  if(!/^\d{12,19}$/.test(num) || !/^\d{2}\/\d{2}$/.test(exp) || !/^\d{3,4}$/.test(cvv) || name.trim().length<2){
    alert('Enter valid card number, expiry, CVV, and name.');
    return false;
  }
  return true;
}
function cardSummary(provider){
  return `<div class="payment-wait"><strong>${provider==='debit_card'?'Debit':'Credit'} card submitted.</strong><p>Payment is being verified securely in the background.</p></div>`;
}
function showDetails(d){
  detailsBox.className='card';
  detailsBox.innerHTML=`<h3>Unlocked details</h3><p><strong>Experience:</strong> ${d.experience||'Not provided'}</p><p><strong>Feedback:</strong> ${d.feedback_summary||'No premium feedback yet.'}</p>`;
  if(d.more_reviews && d.more_reviews.length && window.reviewList){
    reviewList.innerHTML=d.more_reviews.map(r=>`<div class="review-mini"><strong>${r.user_name||'User'}</strong><span>${r.rating} star</span><p>${r.comment}</p></div>`).join('');
  }
}
</script>
</body></html>
