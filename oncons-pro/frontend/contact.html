<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contact — OnCons</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/styles.css">

</head><body>

<div class="page"><h1>Contact us</h1><p>Questions, partnership ideas, or feedback? Send us a note.</p>
<form class="form" onsubmit="send(event)">
  <label>Name<input required name="name"></label>
  <label>Email<input required type="email" name="email"></label>
  <label>Message<textarea required name="message" rows="5"></textarea></label>
  <button class="btn btn-primary">Send</button>
  <div id="msg"></div>
</form></div>

<script src="/assets/js/shared.js"></script>
<script>
async function send(e){e.preventDefault();const f=new FormData(e.target);const m=document.getElementById('msg');
try{await api('/contact',{method:'POST',body:JSON.stringify(Object.fromEntries(f))});m.innerHTML='<div class="alert alert-ok">Thanks — we\'ll be in touch.</div>';e.target.reset();}
catch(err){m.innerHTML='<div class="alert alert-error">'+err.message+'</div>'}}
</script>
</body></html>
