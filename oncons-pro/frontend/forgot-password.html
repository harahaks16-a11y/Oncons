<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forgot password — OnCons</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/styles.css">

</head><body data-no-chrome="true">

<div class="page" style="max-width:480px"><h1>Reset your password</h1>
<form class="form" onsubmit="rq(event)"><label>Email<input required type="email" name="email"></label>
<button class="btn btn-primary">Send reset link</button><div id="msg"></div></form></div>

<script src="/assets/js/shared.js"></script>
<script>
async function rq(e){e.preventDefault();const f=Object.fromEntries(new FormData(e.target));
try{await api('/auth/forgot-password',{method:'POST',body:JSON.stringify(f)});document.getElementById('msg').innerHTML='<div class="alert alert-ok">Check your email.</div>'}catch(err){document.getElementById('msg').innerHTML='<div class="alert alert-error">'+err.message+'</div>'}}
</script>
</body></html>
