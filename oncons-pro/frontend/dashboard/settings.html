<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>User Settings - OnCons</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/styles.css">
</head><body>
<div class="dash-layout"><aside class="dash-side"><a href="/dashboard/index.html">Overview</a><a href="/dashboard/bookings.html">Bookings</a><a href="/dashboard/chat.html">AI Chat Bot</a><a href="/dashboard/profile.html">Profile</a><a href="/dashboard/notifications.html">Notifications</a><a href="/dashboard/settings.html" class="active">Settings</a></aside>
<main class="dash-main">
<h1>Settings</h1>
<div class="settings-grid">
  <section class="settings-card"><h2>Account</h2><label class="toggle-row"><span>Email notifications</span><input type="checkbox" checked></label><label class="toggle-row"><span>Booking reminders</span><input type="checkbox" checked></label><label class="toggle-row"><span>Payment alerts</span><input type="checkbox" checked></label></section>
  <section class="settings-card"><h2>Customer Support</h2><p>Need help with booking, payment, consultant availability, or video room?</p><button class="btn btn-primary" onclick="supportMsg()">Contact support</button><div id="supportBox"></div></section>
  <section class="settings-card"><h2>Privacy</h2><p>Your email is used for OTP and login. Consultants only see your name inside the consultation room.</p><button class="btn btn-ghost" onclick="logout()">Logout</button></section>
</div>
</main></div>
<script src="/assets/js/shared.js"></script>
